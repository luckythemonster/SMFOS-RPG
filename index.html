<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punk-Rock Sci-Fi JRPG</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- DOM Overlay for UI and Dialogues -->
    <div id="domOverlay" class="overlay-container">

      <!-- Timer UI -->
      <div id="timerContainer" class="timer-container hidden">
        <span class="timer-label">TIME: </span>
        <span id="timerText" class="timer-text">60</span>
      </div>

      <div id="hud-overlay"></div>

      <!-- Cinematic Overlays -->
      <div id="letterboxTop" class="letterbox letterbox-top hidden"></div>
      <div id="letterboxBottom" class="letterbox letterbox-bottom hidden"></div>

      <div id="fadeOverlay" class="fade-overlay hidden">
        <div id="endLogo" class="end-logo hidden">Lucky & Phoenix's Wasteland Odyssey<br>DEMO COMPLETE</div>
      </div>

      <div id="spacePrompt" class="space-prompt hidden">Press [SPACE] to finish the Heist!</div>


      <div id="dialogueBox" class="dialogue-box hidden">
        <span id="dialogueSender" class="dialogue-sender"></span>
        <p id="dialogueText" class="dialogue-text"></p>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
